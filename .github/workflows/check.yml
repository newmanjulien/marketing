name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
        env:
          # svelte-kit sync generates the $env/static typings from the real
          # environment; the variable must exist but its value never matters here.
          PUBLIC_CONVEX_URL: http://ci-placeholder
