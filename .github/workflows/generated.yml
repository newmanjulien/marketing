name: Generated code

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run convex:codegen
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - run: npm run generate:reserved-slugs
      - run: git diff --exit-code -- convex/_generated shared/generated
